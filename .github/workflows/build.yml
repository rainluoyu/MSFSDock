name: Build Mirabox (AJ202X)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Mirabox plugin
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure & Build (Ninja, HW_PLATFORM=MIRABOX)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { $vswhere = "$env:ProgramFiles\Microsoft Visual Studio\Installer\vswhere.exe" }
          if (-not (Test-Path $vswhere)) {
            Write-Host "::error::vswhere.exe not found"
            exit 1
          }
          $vsInstall = & $vswhere -latest -products * -property installationPath | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            Write-Host "::error::vswhere returned no Visual Studio installation"
            exit 1
          }
          $vcvars = Join-Path $vsInstall 'VC\Auxiliary\Build\vcvars64.bat'
          if (-not (Test-Path $vcvars)) {
            Write-Host "::error::vcvars64.bat not found at $vcvars"
            exit 1
          }
          Write-Host "Using VS install: $vsInstall"

          $bat = Join-Path $env:RUNNER_TEMP 'build_run.bat'
          @"
@echo on
call "$vcvars"
python build.py -p mirabox -t release -d
"@ | Set-Content -Path $bat -Encoding ASCII

          $logFile = Join-Path $env:RUNNER_TEMP 'build.log'
          & cmd /c $bat *> $logFile
          $code = $LASTEXITCODE
          Get-Content $logFile | Write-Host
          if ($code -ne 0) {
            $tail = Get-Content $logFile -Tail 30
            foreach ($line in $tail) { if ($line.Trim()) { Write-Host "::error::$($line.Trim())" } }
            exit $code
          }

      - name: Locate plugin archive
        id: archive
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path build -Recurse -Filter "*.zip" | Select-Object -First 1
          Write-Host "Found archive: $($zip.FullName)"
          "path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($zip.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload complete plugin archive
        uses: actions/upload-artifact@v4
        with:
          name: msfsDock-mirabox
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          retention-days: 14