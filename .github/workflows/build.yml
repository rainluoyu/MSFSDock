name: Build Mirabox (AJ202X)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Mirabox plugin
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure & Build (Ninja, HW_PLATFORM=MIRABOX)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { $vswhere = "$env:ProgramFiles\Microsoft Visual Studio\Installer\vswhere.exe" }
          if (-not (Test-Path $vswhere)) {
            Write-Host "::error::vswhere.exe not found"
            exit 1
          }
          $vsInstall = & $vswhere -latest -products * -property installationPath | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            Write-Host "::error::vswhere returned no Visual Studio installation"
            exit 1
          }
          $vcvars = Join-Path $vsInstall 'VC\Auxiliary\Build\vcvars64.bat'
          if (-not (Test-Path $vcvars)) {
            Write-Host "::error::vcvars64.bat not found at $vcvars"
            exit 1
          }
          Write-Host "Using VS install: $vsInstall"

          $bat = Join-Path $env:RUNNER_TEMP 'build_run.bat'
          $lines = @(
            '@echo on',
            "call `"$vcvars`"",
            'python build.py -p mirabox -t release -d'
          )
          $lines | Set-Content -Path $bat -Encoding ASCII

          $logFile = Join-Path $env:RUNNER_TEMP 'build.log'
          & cmd /c $bat *> $logFile
          $code = $LASTEXITCODE
          Get-Content $logFile | Write-Host
          if ($code -ne 0) {
            $tail = Get-Content $logFile -Tail 30
            foreach ($line in $tail) { if ($line.Trim()) { Write-Host "::error::$($line.Trim())" } }
            exit $code
          }

      - name: Locate plugin archive
        id: archive
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path build -Recurse -Filter "*.zip" | Select-Object -First 1
          Write-Host "Found archive: $($zip.FullName)"
          "path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($zip.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload complete plugin archive
        uses: actions/upload-artifact@v4
        with:
          name: msfsDock-mirabox
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release with plugin archive
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zipPath = '${{ steps.archive.outputs.path }}'
          $zipName = '${{ steps.archive.outputs.name }}'

          # Read version from the plugin's manifest.json inside the built tree.
          $manifest = Get-ChildItem -Path build -Recurse -Filter manifest.json |
            Where-Object { $_.FullName -match 'com\.rvoronov' } | Select-Object -First 1
          if (-not $manifest) {
            Write-Host "::error::manifest.json not found in build tree"
            exit 1
          }
          $data = Get-Content $manifest.FullName -Raw | ConvertFrom-Json
          $version = $data.Version
          if (-not $version) { $version = '0.0.0.0' }
          $tag = "v$version"
          Write-Host "Plugin version: $version -> tag $tag"

          $repo = $env:GITHUB_REPOSITORY
          $existing = $null
          try { $existing = gh release view $tag --repo $repo --json name,tagName 2>$null } catch {}
          $title = "MSFSDock $tag (Mirabox/Ajazz)"
          $notes = @"
          Auto-built by GitHub Actions run ${{ github.run_id }}.
          Commit: ${{ github.sha }}
          Platform: HW_PLATFORM=MIRABOX

          This archive contains the complete plugin directory and can be unzipped over the existing Stream Dock plugin folder.
          "@

          if ($existing) {
            Write-Host "Release $tag already exists; updating assets"
            gh release upload $tag $zipPath --repo $repo --clobber
          } else {
            Write-Host "Creating release $tag"
            gh release create $tag $zipPath --repo $repo --title $title --notes $notes --latest
          }